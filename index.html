<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chung Cư Virtual Tour</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; }
        .container { position: relative; width: fit-content; margin: 50px auto; border: 10px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .sodo-img { max-width: 1000px; height: auto; display: block; }
        
        /* GỘP STYLE: Nút số hình vuông bo góc, đỏ, hover đen */
        .btn-phong {
            position: absolute;
            width: 32px; height: 32px;
            background: #e63946; color: white;
            border-radius: 6px; text-align: center;
            line-height: 32px; cursor: pointer; font-weight: bold;
            font-size: 16px; transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .btn-phong:hover {
            background: #000000;
            transform: scale(1.1);
        }

        /* Tọa độ - Bạn hãy tự chỉnh lại các % này cho khớp với ảnh thực tế nhé */
        #hanh-lang    { top: 31%; left: 15%; }
        #ban-an       { top: 31%; left: 38%; }
        #bep          { top: 65%; left: 40%; }
        #phong-khach  { top: 27%; left: 62%; }
        #phong-ngu-1  { top: 51%; left: 68%; }
        #phong-ngu-2  { top: 49%; left: 21%; }
        #phong-ngu-3  { top: 78%; left: 22%; }
        #WC           { top: 18%; left: 11%; }


        /* Lớp phủ (Modal) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100;
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%;
            background-color: rgba(0,0,0,0.95);
        }

        /* Vùng chứa nội dung 360 và nút đóng: Căn giữa toàn màn hình */
        .modal-content { 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Căn giữa hoàn hảo */
            width: 95%; /* Chiếm phần lớn chiều rộng màn hình */
            height: 85%; /* Chiếm phần lớn chiều cao màn hình */
            max-width: 1400px; /* Chiều rộng tối đa trên máy tính lớn */
            position: relative; 
            background: black; /* Màu nền cho vùng chứa */
            border-radius: 12px;
            overflow: hidden; /* Che bớt phần iframe thừa */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* NÚT BACK / ĐÓNG XỊN HƠN: Ghim cố định trên IFRAME */
        .close-btn { 
            position: absolute; 
            top: 15px; /* Khoảng cách từ trên cùng */
            right: 15px; /* Khoảng cách từ bên phải */
            color: white; 
            font-size: 16px; 
            cursor: pointer; 
            background: #e63946; /* Màu đỏ */
            padding: 10px 25px; /* Tăng khoảng cách đệm cho dễ bấm */
            border-radius: 5px;
            transition: 0.3s ease;
            z-index: 110; /* Đảm bảo nằm trên cùng của modal */
            font-weight: bold;
            display: flex; /* Căn giữa text bên trong */
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .close-btn:hover { 
            background: #000; 
            transform: scale(1.05); /* Phóng to nhẹ khi hover */
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }        
    </style>
</head>
<body>

<div class="container">
    <img src="SoDoChungCu.png" class="sodo-img">

    <div class="btn-phong" id="hanh-lang" onclick="open360('https://api2.enscape3d.com/v3/view/9029a339-2edd-4694-a5ed-ceb62b227d13')">1</div>
    <div class="btn-phong" id="ban-an" onclick="open360('https://api2.enscape3d.com/v3/view/27f9c56d-f707-43ae-9374-dec36f52e5d9')">2</div>
    <div class="btn-phong" id="bep" onclick="open360('https://api2.enscape3d.com/v3/view/7d0e83dd-3ec1-47f3-af02-0c7fb54a5b1a')">3</div>
    <div class="btn-phong" id="phong-khach" onclick="open360('https://api2.enscape3d.com/v3/view/6dccf307-5867-46f9-8cbf-18b02c279a8b')">4</div>
    <div class="btn-phong" id="phong-ngu-1" onclick="open360('https://api2.enscape3d.com/v3/view/9b5f6a9a-0deb-4edf-969b-900a8d6537eb')">5</div>
    <div class="btn-phong" id="phong-ngu-2" onclick="open360('https://api2.enscape3d.com/v3/view/2155d879-7141-4955-9565-84edfeb82c85')">6</div>
    <div class="btn-phong" id="phong-ngu-3" onclick="open360('https://api2.enscape3d.com/v3/view/534291bc-b4f0-4b8c-828f-3949b49da11b')">7</div>
    <div class="btn-phong" id="WC" onclick="open360('https://api2.enscape3d.com/v3/view/1f465127-cf66-4df3-9e64-04821e3767ee')">8</div>
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="close360()">← Quay về sơ đồ</span>
        <iframe id="iframe360" src=""></iframe>
    </div>
</div>

<script>
    function open360(url) {
        document.getElementById('iframe360').src = url;
        document.getElementById('myModal').style.display = "block";
    }
    function close360() {
        document.getElementById('myModal').style.display = "none";
        document.getElementById('iframe360').src = ""; 
    }
</script>

</body>
</html>
